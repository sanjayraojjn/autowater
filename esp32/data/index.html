<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="author" content="Stéphane Calderoni">
  <meta name="description" content="ESP32 Remote Control with WebSocket">
  <title>ESP32 remote control</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="index.css">
  <script src="index.js"></script>
</head>

<body>
  <div class="panel">
    <h1>ESP32 remote control</h1>
    <div id="led" class="%STATE%"></div>
    <table>
      <tr>
        <th>Item</th>
        <th>Value</th>
      </tr>
      <tr>
        <td>Soil Dryness</td>
        <td><div id="soil_dryness_level"></div></td>
      </tr>
      <tr>
        <td>Required Dryness Level</td>
        <td><div id="required_soil_dryness"></div></td>
      </tr>
    </table>
    <button id="refresh">Refresh</button>
    <button id="toggle">Toggle</button>
  </div>
</body>

</html>
